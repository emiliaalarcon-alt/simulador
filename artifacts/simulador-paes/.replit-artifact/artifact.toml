kind = "web"
previewPath = "/"
title = "Simulador PAES"
version = "1.0.0"
id = "artifacts/simulador-paes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20811

[services.development]
run = "pnpm --filter @workspace/simulador-paes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/simulador-paes", "run", "build" ]
publicDir = "artifacts/simulador-paes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20811"
BASE_PATH = "/"
