name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          PORT: 3000
          BASE_PATH: /simulador/
        run: pnpm --filter simulador-paes build

      - name: Deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/simulador-paes/dist/public
